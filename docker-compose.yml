version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faultwall_demo
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: ghostpass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./dev/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c pg_stat_statements.max=10000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghost -d faultwall_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  faultwall:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://ghost:ghostpass@postgres:5432/faultwall_demo?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  pg_data:
