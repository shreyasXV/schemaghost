name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - os: macos-13         # x86_64
            goos: darwin
            goarch: amd64
          - os: macos-14         # Apple Silicon
            goos: darwin
            goarch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Install cross-compiler (arm64 linux only)
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          out="faultwall-${VERSION}-${GOOS}-${GOARCH}"
          go build -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "dist/${out}" .
          (cd dist && tar -czf "${out}.tar.gz" "${out}" && rm "${out}")
          # Per-file checksum, joined at the end
          (cd dist && shasum -a 256 "${out}.tar.gz" > "${out}.sha256")
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: faultwall-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: |
          cd dist
          cat *.sha256 > checksums.txt
          rm *.sha256
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
