<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <!-- Background -->
  <rect width="1500" height="500" fill="#0A0A14"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#7C5CFC" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1500" height="500" fill="url(#grid)"/>
  
  <!-- Fade overlay on edges -->
  <defs>
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="15%" y2="0%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A0A14;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="85%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0A0A14;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#fadeLeft)"/>
  <rect width="1500" height="500" fill="url(#fadeRight)"/>
  
  <!-- Large icon mark - center left -->
  <g transform="translate(350, 100) scale(2.3)">
    <rect x="10" y="15" width="14" height="40" rx="3" fill="#7C5CFC"/>
    <rect x="7" y="63" width="14" height="40" rx="3" fill="#7C5CFC" opacity="0.5"/>
    <rect x="34" y="8" width="14" height="96" rx="3" fill="#7C5CFC"/>
    <rect x="58" y="15" width="14" height="40" rx="3" fill="#7C5CFC"/>
    <rect x="58" y="63" width="14" height="40" rx="3" fill="#7C5CFC"/>
  </g>
  
  <!-- Wordmark -->
  <text x="580" y="235" font-family="Inter, -apple-system, Helvetica Neue, sans-serif" font-weight="600" font-size="72" fill="#E8E8F0" letter-spacing="-2">fault<tspan font-weight="800" fill="#7C5CFC">wall</tspan></text>
  
  <!-- Tagline -->
  <text x="583" y="290" font-family="Inter, -apple-system, Helvetica Neue, sans-serif" font-weight="400" font-size="24" fill="#7C5CFC" opacity="0.8" letter-spacing="4">AI-NATIVE TENANT INTELLIGENCE</text>
  
  <!-- Subtle description -->
  <text x="583" y="330" font-family="Inter, -apple-system, Helvetica Neue, sans-serif" font-weight="400" font-size="18" fill="#666680" letter-spacing="0.5">Detect. Predict. Throttle. Open Source.</text>
  
  <!-- Accent glow behind icon -->
  <circle cx="460" cy="250" r="120" fill="#7C5CFC" opacity="0.04"/>
  <circle cx="460" cy="250" r="80" fill="#7C5CFC" opacity="0.03"/>
</svg>
