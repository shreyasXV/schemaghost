# FaultWall Agentic Firewall — Policy Configuration
#
# Agents identify themselves via PostgreSQL application_name:
#   SET application_name = 'agent:<agent_id>:mission:<mission_id>';
#
# default_policy: deny | allow
#   deny  = block any agent not explicitly listed
#   allow = permit unlisted agents (only blocked_* rules apply)

default_policy: deny

# Global function blocklist — deny-by-default for dangerous PG functions.
# These are blocked for ALL agents unless explicitly allowed per-agent.
blocked_functions:
  # Sleep / process control
  - pg_sleep
  - pg_terminate_backend
  - pg_cancel_backend
  - pg_reload_conf
  - pg_rotate_logfile
  # Large object manipulation
  - lo_export
  - lo_import
  - lo_unlink
  - lo_from_bytea
  - lo_get
  - lo_put
  - lo_create
  # Filesystem access
  - pg_read_file
  - pg_read_binary_file
  - pg_ls_dir
  - pg_stat_file
  - pg_execute_server_program
  # Config manipulation
  - set_config
  # Remote connections
  - dblink
  - dblink_exec
  - dblink_connect
  - dblink_send_query
  # Dynamic SQL execution (query string → server-side exec)
  - query_to_xml
  - query_to_xml_and_xmlschema
  - table_to_xml
  - table_to_xmlschema
  - table_to_xml_and_xmlschema
  - schema_to_xml
  - schema_to_xmlschema
  - schema_to_xml_and_xmlschema
  - database_to_xml
  - database_to_xmlschema
  - database_to_xml_and_xmlschema
  - xpath_table
  - ts_stat

# Custom security profiles (optional — built-in profiles always available)
# Built-in profiles: permissive, standard, strict
profiles:
  custom-readonly:
    extends: strict
    allowed_operations:
      - SELECT
      - EXPLAIN

agents:
  cursor-ai:
    description: "Cursor IDE agent"
    auth_token: "cursor-secret-123"
    profile: standard              # Built-in: permissive | standard | strict
    # profile_overrides:           # Optional per-agent tweaks on top of profile
    #   allow:
    #     - COPY                   # allow COPY even though standard blocks it
    #   block:
    #     - MERGE                  # block MERGE even though standard allows it
    missions:
      summarize-feedback:
        tables:
          - "public.feedback"
          - "public.products"
        max_rows: 1000
        max_query_time_ms: 5000

      update-shipping:
        tables:
          - "public.orders"
        max_rows: 100

    blocked_tables:
      - public.users
      - public.payments
      - pg_catalog.*

  langchain-agent:
    description: "LangChain research agent"
    auth_token: "langchain-secret-456"
    missions:
      research:
        tables:
          - "public.articles"
          - "public.categories"
        max_rows: 5000
    blocked_operations:
      - DROP
      - TRUNCATE
      - DELETE
      - ALTER
      - CREATE
      - GRANT
      - COPY
    blocked_tables:
      - public.users
      - public.payments

  demo-agent:
    description: "Demo agent for testing"
    auth_token: "demo-secret-789"
    missions:
      read-feedback:
        tables:
          - "public.feedback"
        max_rows: 500
    blocked_operations:
      - DROP
      - TRUNCATE
      - DELETE
      - ALTER
      - CREATE
      - GRANT
      - COPY
    blocked_tables:
      - public.users
      - public.payments
      - pg_catalog.*

# Unidentified connections (no agent: prefix in application_name)
unidentified:
  policy: monitor  # monitor | deny | allow
