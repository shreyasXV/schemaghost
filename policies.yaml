# FaultWall Agentic Firewall — Policy Configuration
#
# Agents identify themselves via PostgreSQL application_name:
#   SET application_name = 'agent:<agent_id>:mission:<mission_id>';
#
# default_policy: deny | allow
#   deny  = block any agent not explicitly listed
#   allow = permit unlisted agents (only blocked_* rules apply)

default_policy: deny

# Global function blocklist — deny-by-default for dangerous PG functions.
# These are blocked for ALL agents unless explicitly allowed per-agent.
blocked_functions:
  # ── Sleep / Process Control ──
  - pg_sleep
  - pg_sleep_for
  - pg_sleep_until
  - pg_terminate_backend
  - pg_cancel_backend
  - pg_reload_conf
  - pg_rotate_logfile
  - pg_promote

  # ── Large Object Manipulation ──
  - lo_*

  # ── Filesystem Access ──
  - pg_read_file
  - pg_read_binary_file
  - pg_ls_dir
  - pg_ls_waldir
  - pg_ls_logdir
  - pg_ls_tmpdir
  - pg_ls_archive_statusdir
  - pg_stat_file
  - pg_relation_filepath
  - pg_execute_server_program

  # ── Config / Settings ──
  - set_config
  - current_setting

  # ── Remote Connections ──
  - dblink*

  # ── Dynamic SQL / XML execution ──
  - query_to_xml*
  - table_to_xml*
  - schema_to_xml*
  - database_to_xml*
  - xpath_table
  - ts_stat

  # ── WAL / Replication (admin-only) ──
  - pg_switch_wal
  - pg_current_wal_*
  - pg_walfile_name*
  - pg_wal_replay_*
  - pg_start_backup
  - pg_stop_backup
  - pg_create_restore_point
  - pg_export_snapshot
  - pg_log_standby_snapshot
  - txid_*

  # ── Server Info Reconnaissance ──
  - version
  - pg_postmaster_start_time
  - pg_conf_load_time
  - pg_backend_pid
  - pg_is_in_recovery
  - pg_is_wal_replay_paused
  - inet_server_addr
  - inet_server_port
  - inet_client_addr
  - inet_client_port

  # ── Internal Stats (bulk prefix) ──
  - pg_stat_get_*

  # ── Privilege Check Functions (info leak) ──
  - has_table_privilege
  - has_column_privilege
  - has_database_privilege
  - has_function_privilege
  - has_schema_privilege
  - has_server_privilege
  - has_tablespace_privilege
  - has_type_privilege
  - has_sequence_privilege
  - has_any_column_privilege
  - has_foreign_data_wrapper_privilege
  - pg_has_role

  # ── Advisory Locks (DoS vector) ──
  - pg_advisory_lock*
  - pg_try_advisory_lock*

  # ── Size / Recon ──
  - pg_relation_size
  - pg_table_size
  - pg_total_relation_size
  - pg_database_size
  - pg_tablespace_size
  - pg_indexes_size
  - pg_column_size

  # ── Resource Exhaustion ──
  - generate_series
  - repeat

  # ── JSON/record manipulation (can bypass type restrictions) ──
  - json_populate_record*
  - jsonb_populate_record*
  - json_to_record*
  - jsonb_to_record*
  - json_each*
  - jsonb_each*
  - json_agg
  - jsonb_agg
  - json_object_agg
  - jsonb_object_agg
  - jsonb_path_query*
  - json_array_elements*
  - jsonb_array_elements*
  - row_to_json
  - to_json
  - to_jsonb
  - json_build_object
  - jsonb_build_object
  - json_build_array
  - jsonb_build_array
  - json_strip_nulls
  - jsonb_strip_nulls
  - jsonb_insert
  - jsonb_set

  # ── Array / Unnest (data exfiltration via array constructors) ──
  - unnest
  - array_agg
  - array_to_string
  - string_to_array

  # ── XML (query execution via XML functions) ──
  - xpath
  - xpath_exists
  - xmlparse
  - xmlserialize
  - xmlelement
  - xmlforest
  - xmlagg
  - xmlconcat
  - xmlroot
  - xmlpi

  # ── Metadata / Type inspection ──
  - obj_description
  - col_description
  - shobj_description
  - pg_typeof

  # ── String Obfuscation (used to build function names dynamically) ──
  - chr
  - ascii
  - overlay
  - lpad
  - rpad
  - reverse
  - translate
  - regexp_replace
  - convert_from
  - convert_to
  - encode
  - decode

  # ── Sequence Manipulation ──
  - setval
  - nextval
  - currval

  # ── System Info ──
  - aclexplode
  - pg_get_functiondef
  - pg_get_viewdef
  - pg_get_indexdef
  - pg_get_triggerdef
  - pg_get_ruledef
  - pg_get_constraintdef
  - pg_get_expr
  - pg_get_userbyid
  - pg_identify_object*
  - format

# Custom security profiles (optional — built-in profiles always available)
# Built-in profiles: permissive, standard, strict
profiles:
  custom-readonly:
    extends: strict
    allowed_operations:
      - SELECT
      - EXPLAIN

agents:
  cursor-ai:
    description: "Cursor IDE agent"
    auth_token: "cursor-secret-123"
    profile: standard              # Built-in: permissive | standard | strict
    # profile_overrides:           # Optional per-agent tweaks on top of profile
    #   allow:
    #     - COPY                   # allow COPY even though standard blocks it
    #   block:
    #     - MERGE                  # block MERGE even though standard allows it
    missions:
      summarize-feedback:
        tables:
          - "public.feedback"
          - "public.products"
        max_rows: 1000
        max_query_time_ms: 5000

      update-shipping:
        tables:
          - "public.orders"
        max_rows: 100

    blocked_tables:
      - public.users
      - public.payments
      - pg_catalog.*
      - information_schema.*

  langchain-agent:
    description: "LangChain research agent"
    auth_token: "langchain-secret-456"
    missions:
      research:
        tables:
          - "public.articles"
          - "public.categories"
        max_rows: 5000
    blocked_operations:
      - DROP
      - TRUNCATE
      - DELETE
      - ALTER
      - CREATE
      - GRANT
      - COPY
    blocked_tables:
      - public.users
      - public.payments
      - pg_catalog.*
      - information_schema.*

  demo-agent:
    description: "Demo agent for testing"
    auth_token: "demo-secret-789"
    missions:
      read-feedback:
        tables:
          - "public.feedback"
        max_rows: 500
    blocked_operations:
      - DROP
      - TRUNCATE
      - DELETE
      - ALTER
      - CREATE
      - GRANT
      - COPY
    blocked_tables:
      - public.users
      - public.payments
      - pg_catalog.*
      - information_schema.*

# Unidentified connections (no agent: prefix in application_name)
unidentified:
  policy: monitor  # monitor | deny | allow
  blocked_tables:
    - pg_catalog.*
    - information_schema.*
